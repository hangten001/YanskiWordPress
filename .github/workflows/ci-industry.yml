name: Simple WordPress CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    lint:
        runs-on: ubuntu-latest

        steps:
            # 1️⃣ Checkout repo
            - name: Checkout repository
              uses: actions/checkout@v3

            # 2️⃣ Setup PHP
            - name: Setup PHP 8.2
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.2"

            # 3️⃣ PHP Syntax Check
            - name: PHP Syntax Check
              run: |
                  echo "Checking PHP syntax..."
                  find app/public/wp-content/themes/YanskiWordPress -type f -name "*.php" -exec php -l {} \;
                  echo "PHP syntax check done ✔"

            # 4️⃣ PHP CodeSniffer (PSR-12)
            - name: PHP CodeSniffer
              run: |
                  echo "Running PHP CodeSniffer..."
                  composer global require "squizlabs/php_codesniffer=*"
                  phpcs --standard=PSR12 app/public/wp-content/themes/YanskiWordPress
                  echo "PHP CodeSniffer done ✔"
