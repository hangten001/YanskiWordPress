name: Simple CI

on:
    push:
    pull_request:

jobs:
    php-lint:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Check PHP syntax
              run: |
                  echo "Checking PHP syntax..."
                  find wp-content/themes/YanskiWordPress -name "*.php" -exec php -l {} \;
